<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SwiftImage - Free Image Converter & Compressor | تحويل وضغط الصور مجاناً">
<meta name="keywords" content="image converter, image compressor, PNG to JPG, WebP converter, تحويل صور, convertisseur image">
<title>SwiftImage | Free Image Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #ffffff0f;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --accent3: #f472b6;
    --text: #f1f5f9;
    --muted: #64748b;
    --success: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body.ltr { direction: ltr; font-family: 'Syne', sans-serif; }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(110,231,183,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(110,231,183,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }
  .bg-glow {
    position: fixed; width: 600px; height: 600px;
    border-radius: 50%; filter: blur(120px);
    pointer-events: none; z-index: 0; opacity: 0.12;
  }
  .glow-1 { background: var(--accent); top: -200px; right: -100px; }
  .glow-2 { background: var(--accent2); bottom: -200px; left: -100px; }

  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px; }

  header {
    padding: 16px 0; border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .logo {
    font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -1px; flex-shrink: 0;
  }

  /* Language selector */
  .lang-selector { position: relative; }
  .lang-current {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 100px;
    cursor: pointer; font-family: inherit; font-size: 0.85rem;
    font-weight: 700; display: flex; align-items: center; gap: 6px;
    transition: all 0.3s; white-space: nowrap;
  }
  .lang-current:hover { border-color: var(--accent); color: var(--accent); }
  .lang-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 8px; min-width: 180px;
    display: none; z-index: 200; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lang-dropdown.open { display: block; animation: fadeUp 0.2s ease; }
  .lang-option {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    font-size: 0.9rem; font-weight: 600; transition: background 0.2s;
    color: var(--text);
  }
  .lang-option:hover { background: rgba(255,255,255,0.05); }
  .lang-option.active { color: var(--accent); background: rgba(110,231,183,0.08); }
  .lang-flag { font-size: 1.1rem; }

  .hero { text-align: center; padding: 70px 20px 50px; animation: fadeUp 0.8s ease both; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(110,231,183,0.1); border: 1px solid rgba(110,231,183,0.2);
    color: var(--accent); padding: 6px 16px; border-radius: 100px;
    font-size: 0.85rem; font-weight: 700; margin-bottom: 24px;
  }
  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.6rem); font-weight: 900;
    line-height: 1.15; margin-bottom: 16px; letter-spacing: -1px;
  }
  .hero h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p { color: var(--muted); font-size: 1.05rem; max-width: 520px; margin: 0 auto 40px; line-height: 1.7; }

  .tools-nav { display: flex; justify-content: center; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .tool-tab {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); padding: 10px 22px; border-radius: 100px;
    cursor: pointer; font-family: inherit; font-size: 0.95rem;
    font-weight: 700; transition: all 0.3s;
  }
  .tool-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .tool-tab.active {
    background: linear-gradient(135deg, rgba(110,231,183,0.15), rgba(129,140,248,0.15));
    border-color: var(--accent); color: var(--accent);
  }

  .tool-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 24px; padding: 36px; margin-bottom: 20px;
    animation: fadeUp 0.6s ease both; display: none;
  }
  .tool-card.active { display: block; }

  .dropzone {
    border: 2px dashed var(--border); border-radius: 16px;
    padding: 55px 20px; text-align: center; cursor: pointer;
    transition: all 0.3s; position: relative; background: rgba(255,255,255,0.01);
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent); background: rgba(110,231,183,0.04);
  }
  .dropzone-icon { font-size: 2.8rem; margin-bottom: 14px; display: block; opacity: 0.7; }
  .dropzone h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
  .dropzone p { color: var(--muted); font-size: 0.88rem; }
  .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .options-row { display: flex; gap: 16px; margin-top: 22px; flex-wrap: wrap; align-items: flex-end; }
  .option-group { flex: 1; min-width: 130px; }
  .option-group label {
    display: block; font-size: 0.82rem; color: var(--muted);
    margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .option-group select {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px;
    font-family: inherit; font-size: 0.95rem; appearance: none; cursor: pointer;
  }
  .option-group select:focus { outline: none; border-color: var(--accent); }
  input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .quality-val { font-size: 0.85rem; color: var(--accent); font-weight: 700; text-align: center; margin-top: 6px; }

  .convert-btn {
    width: 100%; margin-top: 22px; padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0a0f; border: none; border-radius: 12px;
    font-family: inherit; font-size: 1rem; font-weight: 900;
    cursor: pointer; transition: all 0.3s;
  }
  .convert-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(110,231,183,0.25); }
  .convert-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-top: 24px; }
  .preview-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; animation: fadeUp 0.4s ease both; position: relative;
  }
  .preview-item img { width: 100%; height: 110px; object-fit: cover; display: block; }
  .preview-info { padding: 8px 10px; }
  .preview-name { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .preview-size { font-size: 0.8rem; font-weight: 700; color: var(--accent); }
  .preview-remove {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.7); border: none; color: white;
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
  }
  .preview-remove:hover { background: #ef4444; }

  .results-section { margin-top: 28px; display: none; }
  .results-section.show { display: block; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .results-title { font-size: 1rem; font-weight: 700; color: var(--accent); }
  .download-all-btn {
    background: rgba(110,231,183,0.1); border: 1px solid rgba(110,231,183,0.3);
    color: var(--accent); padding: 7px 16px; border-radius: 100px;
    cursor: pointer; font-family: inherit; font-size: 0.83rem; font-weight: 700;
  }
  .download-all-btn:hover { background: rgba(110,231,183,0.2); }

  .result-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px; animation: fadeUp 0.4s ease both;
  }
  .result-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
  .result-meta { flex: 1; min-width: 0; }
  .result-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-sizes { font-size: 0.78rem; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .size-saved { color: var(--success); font-weight: 700; }
  .download-btn {
    background: var(--accent); color: #0a0a0f; border: none;
    padding: 7px 14px; border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: 0.82rem; font-weight: 900;
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .download-btn:hover { opacity: 0.85; }

  .progress-bar { height: 3px; background: var(--border); border-radius: 100px; margin-top: 14px; overflow: hidden; display: none; }
  .progress-bar.show { display: block; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.3s ease; width: 0%; }

  .processing { text-align: center; padding: 16px; color: var(--accent); font-weight: 700; display: none; }
  .processing.show { display: block; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(110,231,183,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 36px 0; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .stat-label { color: var(--muted); font-size: 0.83rem; margin-top: 4px; }

  .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; margin: 16px 0 50px; }
  .feature-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; transition: border-color 0.3s; }
  .feature-card:hover { border-color: rgba(110,231,183,0.3); }
  .feature-icon { font-size: 1.7rem; margin-bottom: 10px; display: block; }
  .feature-card h3 { font-size: 0.97rem; font-weight: 700; margin-bottom: 7px; }
  .feature-card p { color: var(--muted); font-size: 0.83rem; line-height: 1.6; }

  .ad-slot {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: 12px; padding: 16px; text-align: center;
    color: var(--muted); font-size: 0.78rem; margin: 16px 0;
    min-height: 90px; display: flex; align-items: center; justify-content: center;
  }

  footer { border-top: 1px solid var(--border); padding: 28px 0; text-align: center; color: var(--muted); font-size: 0.83rem; }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card); border: 1px solid var(--accent);
    color: var(--accent); padding: 11px 22px; border-radius: 100px;
    font-weight: 700; font-size: 0.88rem; z-index: 9999; transition: transform 0.4s ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .tool-card { padding: 20px 14px; }
    .stats-row { grid-template-columns: 1fr; }
    .options-row { flex-direction: column; }
    .hero { padding: 44px 10px 36px; }
    .lang-dropdown { right: -10px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>
<div class="toast" id="toast"></div>

<header>
  <div class="wrapper header-inner">
    <div class="logo">SwiftImage</div>
    <div class="lang-selector">
      <button class="lang-current" onclick="toggleLangDropdown()" id="lang-current-btn">
        <span id="current-flag">🇸🇦</span>
        <span id="current-lang-name">العربية</span>
        <span>▾</span>
      </button>
      <div class="lang-dropdown" id="lang-dropdown">
        <div class="lang-option active" onclick="setLang('ar')" id="opt-ar"><span class="lang-flag">🇸🇦</span> العربية</div>
        <div class="lang-option" onclick="setLang('en')" id="opt-en"><span class="lang-flag">🇺🇸</span> English</div>
        <div class="lang-option" onclick="setLang('fr')" id="opt-fr"><span class="lang-flag">🇫🇷</span> Français</div>
        <div class="lang-option" onclick="setLang('es')" id="opt-es"><span class="lang-flag">🇪🇸</span> Español</div>
        <div class="lang-option" onclick="setLang('de')" id="opt-de"><span class="lang-flag">🇩🇪</span> Deutsch</div>
        <div class="lang-option" onclick="setLang('pt')" id="opt-pt"><span class="lang-flag">🇧🇷</span> Português</div>
        <div class="lang-option" onclick="setLang('it')" id="opt-it"><span class="lang-flag">🇮🇹</span> Italiano</div>
        <div class="lang-option" onclick="setLang('ru')" id="opt-ru"><span class="lang-flag">🇷🇺</span> Русский</div>
        <div class="lang-option" onclick="setLang('tr')" id="opt-tr"><span class="lang-flag">🇹🇷</span> Türkçe</div>
        <div class="lang-option" onclick="setLang('zh')" id="opt-zh"><span class="lang-flag">🇨🇳</span> 中文</div>
        <div class="lang-option" onclick="setLang('ja')" id="opt-ja"><span class="lang-flag">🇯🇵</span> 日本語</div>
        <div class="lang-option" onclick="setLang('ko')" id="opt-ko"><span class="lang-flag">🇰🇷</span> 한국어</div>
        <div class="lang-option" onclick="setLang('hi')" id="opt-hi"><span class="lang-flag">🇮🇳</span> हिन्दी</div>
        <div class="lang-option" onclick="setLang('id')" id="opt-id"><span class="lang-flag">🇮🇩</span> Indonesia</div>
        <div class="lang-option" onclick="setLang('nl')" id="opt-nl"><span class="lang-flag">🇳🇱</span> Nederlands</div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrapper">
    <section class="hero">
      <div class="hero-badge"><span>✦</span><span id="t-badge"></span></div>
      <h1 id="t-hero-title"></h1>
      <p id="t-hero-desc"></p>
    </section>

    <div class="ad-slot"><span id="t-ad">Advertisement</span></div>

    <div class="tools-nav">
      <button class="tool-tab active" onclick="switchTool('convert')" id="tab-convert"></button>
      <button class="tool-tab" onclick="switchTool('compress')" id="tab-compress"></button>
    </div>

    <!-- CONVERT TOOL -->
    <div class="tool-card active" id="tool-convert">
      <div class="dropzone" id="dropzone-convert">
        <input type="file" accept="image/*" multiple id="file-convert" onchange="handleFiles(this.files,'convert')">
        <span class="dropzone-icon">🖼️</span>
        <h3 id="t-drop1-title"></h3>
        <p id="t-drop1-sub"></p>
      </div>
      <div class="preview-grid" id="preview-convert"></div>
      <div class="options-row">
        <div class="option-group">
          <label id="t-label-format"></label>
          <select id="output-format">
            <option value="image/jpeg">JPG</option>
            <option value="image/png">PNG</option>
            <option value="image/webp">WebP</option>
          </select>
        </div>
        <div class="option-group">
          <label id="t-label-quality"></label>
          <input type="range" min="10" max="100" value="90" id="quality-convert" oninput="document.getElementById('qval-convert').textContent=this.value+'%'">
          <div class="quality-val" id="qval-convert">90%</div>
        </div>
      </div>
      <div class="progress-bar" id="prog-convert"><div class="progress-fill" id="progfill-convert"></div></div>
      <div class="processing" id="proc-convert"><span id="t-proc1"></span> <span class="spinner"></span></div>
      <button class="convert-btn" id="btn-convert" onclick="processFiles('convert')" disabled>
        <span id="t-btn-convert"></span>
      </button>
      <div class="results-section" id="results-convert">
        <div class="results-header">
          <span class="results-title" id="t-result1-title"></span>
          <button class="download-all-btn" onclick="downloadAll('convert')" id="t-dlall1"></button>
        </div>
        <div id="results-list-convert"></div>
      </div>
    </div>

    <!-- COMPRESS TOOL -->
    <div class="tool-card" id="tool-compress">
      <div class="dropzone" id="dropzone-compress">
        <input type="file" accept="image/*" multiple id="file-compress" onchange="handleFiles(this.files,'compress')">
        <span class="dropzone-icon">🗜️</span>
        <h3 id="t-drop2-title"></h3>
        <p id="t-drop2-sub"></p>
      </div>
      <div class="preview-grid" id="preview-compress"></div>
      <div class="options-row">
        <div class="option-group">
          <label id="t-label-compress-q"></label>
          <input type="range" min="10" max="95" value="75" id="quality-compress" oninput="updateCompressLabel(this.value)">
          <div class="quality-val" id="qval-compress"></div>
        </div>
        <div class="option-group">
          <label id="t-label-compress-fmt"></label>
          <select id="compress-format">
            <option value="same" id="t-opt-same"></option>
            <option value="image/jpeg">JPG</option>
            <option value="image/webp">WebP</option>
          </select>
        </div>
      </div>
      <div class="progress-bar" id="prog-compress"><div class="progress-fill" id="progfill-compress"></div></div>
      <div class="processing" id="proc-compress"><span id="t-proc2"></span> <span class="spinner"></span></div>
      <button class="convert-btn" id="btn-compress" onclick="processFiles('compress')" disabled>
        <span id="t-btn-compress"></span>
      </button>
      <div class="results-section" id="results-compress">
        <div class="results-header">
          <span class="results-title" id="t-result2-title"></span>
          <button class="download-all-btn" onclick="downloadAll('compress')" id="t-dlall2"></button>
        </div>
        <div id="results-list-compress"></div>
      </div>
    </div>

    <div class="ad-slot"><span id="t-ad2">Advertisement</span></div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">100%</div><div class="stat-label" id="t-stat1"></div></div>
      <div class="stat-card"><div class="stat-num">0</div><div class="stat-label" id="t-stat2"></div></div>
      <div class="stat-card"><div class="stat-num">∞</div><div class="stat-label" id="t-stat3"></div></div>
    </div>

    <div class="features">
      <div class="feature-card"><span class="feature-icon">🔒</span><h3 id="t-f1t"></h3><p id="t-f1d"></p></div>
      <div class="feature-card"><span class="feature-icon">⚡</span><h3 id="t-f2t"></h3><p id="t-f2d"></p></div>
      <div class="feature-card"><span class="feature-icon">📦</span><h3 id="t-f3t"></h3><p id="t-f3d"></p></div>
      <div class="feature-card"><span class="feature-icon">🌐</span><h3 id="t-f4t"></h3><p id="t-f4d"></p></div>
    </div>

    <div class="ad-slot"><span id="t-ad3">Advertisement</span></div>
  </div>
</main>

<footer><div class="wrapper"><p id="t-footer"></p><p style="margin-top:10px;font-size:0.8rem;"><a href="about.html" style="color:var(--accent);text-decoration:none;margin:0 10px" id="footer-about">من نحن</a><a href="privacy.html" style="color:var(--accent);text-decoration:none;margin:0 10px" id="footer-privacy">سياسة الخصوصية</a></p></div></footer>

<script>
// ===== TRANSLATIONS =====
const T = {
  ar: {
    rtl: true, flag: '🇸🇦', name: 'العربية',
    badge: 'مجاني 100% • بدون تسجيل • خصوصية تامة',
    heroTitle: 'تحويل الصور <span>بسرعة</span><br>وجودة عالية',
    heroDesc: 'حوّل صورك بين PNG و JPG و WebP، أو اضغطها - كل شيء يتم في متصفحك، ملفاتك لا تُرفع لأي خادم.',
    tabConvert: 'تحويل الصيغة', tabCompress: 'ضغط الصور',

// ===== STATE =====
let currentLang = 'ar';
let filesMap = { convert: [], compress: [] };
let resultsMap = { convert: [], compress: [] };

// ===== LANG =====
function toggleLangDropdown() {
  document.getElementById('lang-dropdown').classList.toggle('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.lang-selector')) {
    document.getElementById('lang-dropdown').classList.remove('open');
  }
});

function setLang(lang) {
  currentLang = lang;
  const t = T[lang];
  document.getElementById('lang-dropdown').classList.remove('open');
  document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
  document.getElementById('opt-' + lang).classList.add('active');
  document.getElementById('current-flag').textContent = t.flag;
  document.getElementById('current-lang-name').textContent = t.name;

  const isRTL = t.rtl;
  document.documentElement.lang = lang;
  document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
  document.body.classList.toggle('ltr', !isRTL);

  document.getElementById('t-badge').textContent = t.badge;
  document.getElementById('t-hero-title').innerHTML = t.heroTitle;
  document.getElementById('t-hero-desc').textContent = t.heroDesc;
  document.getElementById('tab-convert').textContent = t.tabConvert;
  document.getElementById('tab-compress').textContent = t.tabCompress;
  document.getElementById('t-drop1-title').textContent = t.drop1Title;
  document.getElementById('t-drop1-sub').textContent = t.drop1Sub;
  document.getElementById('t-drop2-title').textContent = t.drop2Title;
  document.getElementById('t-drop2-sub').textContent = t.drop2Sub;
  document.getElementById('t-label-format').textContent = t.labelFormat;
  document.getElementById('t-label-quality').textContent = t.labelQuality;
  document.getElementById('t-label-compress-q').textContent = t.labelCompressQ;
  document.getElementById('t-label-compress-fmt').textContent = t.labelCompressFmt;
  document.getElementById('t-opt-same').textContent = t.optSame;
  document.getElementById('t-proc1').textContent = t.proc1;
  document.getElementById('t-proc2').textContent = t.proc2;
  document.getElementById('t-btn-convert').textContent = t.btnConvert;
  document.getElementById('t-btn-compress').textContent = t.btnCompress;
  document.getElementById('t-result1-title').textContent = t.result1;
  document.getElementById('t-result2-title').textContent = t.result2;
  document.getElementById('t-dlall1').textContent = t.dlAll;
  document.getElementById('t-dlall2').textContent = t.dlAll;
  document.getElementById('t-stat1').textContent = t.stat1;
  document.getElementById('t-stat2').textContent = t.stat2;
  document.getElementById('t-stat3').textContent = t.stat3;
  document.getElementById('t-f1t').textContent = t.f1t;
  document.getElementById('t-f1d').textContent = t.f1d;
  document.getElementById('t-f2t').textContent = t.f2t;
  document.getElementById('t-f2d').textContent = t.f2d;
  document.getElementById('t-f3t').textContent = t.f3t;
  document.getElementById('t-f3d').textContent = t.f3d;
  document.getElementById('t-f4t').textContent = t.f4t;
  document.getElementById('t-f4d').textContent = t.f4d;
  document.getElementById('t-footer').textContent = t.footer;
  ['t-ad','t-ad2','t-ad3'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = t.ad; });
  updateCompressLabel(document.getElementById('quality-compress').value);
}

// ===== TOOL SWITCH =====
function switchTool(tool) {
  document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tool-' + tool).classList.add('active');
  document.getElementById('tab-' + tool).classList.add('active');
}

// ===== FILE HANDLING =====
function handleFiles(files, tool) {
  Array.from(files).forEach(f => { if (f.type.startsWith('image/')) filesMap[tool].push(f); });
  renderPreviews(tool);
  document.getElementById('btn-' + tool).disabled = !filesMap[tool].length;
}

function renderPreviews(tool) {
  const grid = document.getElementById('preview-' + tool);
  grid.innerHTML = '';
  filesMap[tool].forEach((file, i) => {
    const url = URL.createObjectURL(file);
    const item = document.createElement('div');
    item.className = 'preview-item';
    item.innerHTML = `<img src="${url}"><button class="preview-remove" onclick="removeFile('${tool}',${i})">✕</button><div class="preview-info"><div class="preview-name">${file.name}</div><div class="preview-size">${formatSize(file.size)}</div></div>`;
    grid.appendChild(item);
  });
}

function removeFile(tool, i) {
  filesMap[tool].splice(i, 1);
  renderPreviews(tool);
  document.getElementById('btn-' + tool).disabled = !filesMap[tool].length;
}

// ===== DRAG DROP =====
['convert','compress'].forEach(tool => {
  const dz = document.getElementById('dropzone-' + tool);
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFiles(e.dataTransfer.files, tool); });
});

// ===== PROCESS =====
async function processFiles(tool) {
  const t = T[currentLang];
  if (!filesMap[tool].length) { showToast(t.noFiles); return; }
  const btn = document.getElementById('btn-' + tool);
  const proc = document.getElementById('proc-' + tool);
  const prog = document.getElementById('prog-' + tool);
  const fill = document.getElementById('progfill-' + tool);
  const list = document.getElementById('results-list-' + tool);
  const section = document.getElementById('results-' + tool);

  btn.disabled = true; proc.classList.add('show'); prog.classList.add('show');
  fill.style.width = '0%'; list.innerHTML = ''; resultsMap[tool] = [];

  for (let i = 0; i < filesMap[tool].length; i++) {
    const result = await processImage(filesMap[tool][i], tool);
    resultsMap[tool].push(result);
    fill.style.width = ((i + 1) / filesMap[tool].length * 100) + '%';
    list.appendChild(createResultItem(result, tool));
  }

  proc.classList.remove('show'); section.classList.add('show');
  btn.disabled = false; showToast(t.done);
}

function processImage(file, tool) {
  const MAX_DIM = 3000; // limit for mobile performance
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      // Scale down large images for speed
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX_DIM || h > MAX_DIM) {
        const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);

      let fmt, q, ext;
      if (tool === 'convert') {
        fmt = document.getElementById('output-format').value;
        q = parseInt(document.getElementById('quality-convert').value) / 100;
      } else {
        const f = document.getElementById('compress-format').value;
        fmt = f === 'same' ? file.type : f;
        q = parseInt(document.getElementById('quality-compress').value) / 100;
      }
      ext = fmt === 'image/jpeg' ? 'jpg' : fmt === 'image/webp' ? 'webp' : 'png';
      const name = file.name.replace(/\.[^.]+$/, '') + '.' + ext;

      canvas.toBlob(blob => {
        resolve({ blob, name, originalSize: file.size, newSize: blob.size, dataUrl: canvas.toDataURL(fmt, q) });
      }, fmt, fmt === 'image/png' ? undefined : q);
    };
    img.src = url;
  });
}

function createResultItem(result, tool) {
  const t = T[currentLang];
  const saved = Math.round((1 - result.newSize / result.originalSize) * 100);
  const savedHtml = saved > 0 ? `<span class="size-saved">-${saved}% ${t.saved}</span>` : '';
  const div = document.createElement('div');
  div.className = 'result-item';
  div.innerHTML = `<img class="result-thumb" src="${result.dataUrl}"><div class="result-meta"><div class="result-name">${result.name}</div><div class="result-sizes"><span>${t.original}: ${formatSize(result.originalSize)}</span><span>→</span><span>${formatSize(result.newSize)}</span>${savedHtml}</div></div><button class="download-btn">${t.download}</button>`;
  div.querySelector('.download-btn').addEventListener('click', () => downloadFile(result));
  return div;
}

function downloadFile(result) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(result.blob);
  a.download = result.name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function downloadAll(tool) {
  resultsMap[tool].forEach((r, i) => setTimeout(() => downloadFile(r), i * 300));
}

// ===== HELPERS =====
function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

function updateCompressLabel(val) {
  const t = T[currentLang];
  let label = val < 40 ? t.compLow : val < 75 ? t.compMid : t.compHigh;
  document.getElementById('qval-compress').textContent = label + ' (' + val + '%)';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

setLang('ar');
